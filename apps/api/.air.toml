root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api.exe ./cmd/api"
  bin = "./tmp/api.exe"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "bin"]
  include_dir = []
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  delay = 1000
  stop_on_error = true
  send_interrupt = false
  kill_delay = "0s"
  rerun = false
  rerun_delay = 500
  args_bin = []

[log]
  time = false
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
